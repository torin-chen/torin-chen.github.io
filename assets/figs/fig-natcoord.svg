<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Physics-derived natural coordinates: interfacial resistance 1/G, substrate combinations sqrt(kz kr) and sqrt(kz C), and thin-film combinations kr/C, hC, and C h squared over kz.">
  <rect width="800" height="600" fill="#ffffff"/>

  <text x="400" y="60" text-anchor="middle" font-family="ui-monospace,Menlo,monospace" font-size="22" letter-spacing="3" font-weight="700" fill="#00356b">NATURAL COORDINATES</text>
  <line x1="322" y1="80" x2="478" y2="80" stroke="#00356b" stroke-width="2" opacity="0.35"/>

  <!-- Interface: 1/G -->
  <rect x="48" y="130" width="178" height="56" rx="12" fill="#00356b" opacity="0.08"/>
  <text x="137" y="165" text-anchor="middle" font-family="ui-monospace,Menlo,monospace" font-size="18" letter-spacing="2" font-weight="700" fill="#00356b">INTERFACE</text>
  <g transform="translate(330,158)" fill="#1b1c22" font-family="Georgia,'Times New Roman',serif">
    <text x="0" y="-8" text-anchor="middle" font-size="38">1</text>
    <line x1="-17" y1="0" x2="17" y2="0" stroke="#1b1c22" stroke-width="2.5"/>
    <text x="0" y="34" text-anchor="middle" font-size="38" font-style="italic">G</text>
  </g>

  <!-- Substrate: sqrt(kz kr), sqrt(kz C) -->
  <rect x="48" y="262" width="178" height="56" rx="12" fill="#00356b" opacity="0.08"/>
  <text x="137" y="297" text-anchor="middle" font-family="ui-monospace,Menlo,monospace" font-size="18" letter-spacing="2" font-weight="700" fill="#00356b">SUBSTRATE</text>
  <g transform="translate(322,302)">
    <path d="M0,-12 L7,-18 L15,-2 L28,-42 L122,-42" fill="none" stroke="#1b1c22" stroke-width="3" stroke-linejoin="round" stroke-linecap="round"/>
    <text x="36" y="0" font-family="Georgia,'Times New Roman',serif" font-size="40" fill="#1b1c22"><tspan font-style="italic">k</tspan><tspan font-style="italic" font-size="25" dy="9">z</tspan><tspan font-style="italic" font-size="40" dy="-9" dx="7">k</tspan><tspan font-style="italic" font-size="25" dy="9">r</tspan></text>
  </g>
  <g transform="translate(540,302)">
    <path d="M0,-12 L7,-18 L15,-2 L28,-42 L116,-42" fill="none" stroke="#1b1c22" stroke-width="3" stroke-linejoin="round" stroke-linecap="round"/>
    <text x="36" y="0" font-family="Georgia,'Times New Roman',serif" font-size="40" fill="#1b1c22"><tspan font-style="italic">k</tspan><tspan font-style="italic" font-size="25" dy="9">z</tspan><tspan font-style="italic" font-size="40" dy="-9" dx="11">C</tspan></text>
  </g>

  <!-- Thin film: kr/C, hC, C h^2 / kz -->
  <rect x="48" y="394" width="178" height="56" rx="12" fill="#00356b" opacity="0.08"/>
  <text x="137" y="429" text-anchor="middle" font-family="ui-monospace,Menlo,monospace" font-size="18" letter-spacing="2" font-weight="700" fill="#00356b">THIN FILM</text>
  <text x="300" y="442" font-family="Georgia,'Times New Roman',serif" font-size="40" fill="#1b1c22"><tspan font-style="italic">k</tspan><tspan font-style="italic" font-size="25" dy="9">r</tspan><tspan font-size="40" dy="-9" dx="1">/</tspan><tspan font-style="italic" dx="1">C</tspan></text>
  <text x="418" y="442" font-size="40" fill="#b9bdc6" font-family="Georgia,serif">·</text>
  <text x="452" y="442" font-family="Georgia,'Times New Roman',serif" font-size="40" fill="#1b1c22"><tspan font-style="italic">h</tspan><tspan font-style="italic" dx="2">C</tspan></text>
  <text x="540" y="442" font-size="40" fill="#b9bdc6" font-family="Georgia,serif">·</text>
  <text x="572" y="442" font-family="Georgia,'Times New Roman',serif" font-size="40" fill="#1b1c22"><tspan font-style="italic">C</tspan><tspan font-style="italic" dx="2">h</tspan><tspan font-size="25" dy="-16">2</tspan><tspan font-size="40" dy="16" dx="1">/</tspan><tspan font-style="italic" dx="1">k</tspan><tspan font-style="italic" font-size="25" dy="9">z</tspan></text>

  <line x1="48" y1="508" x2="752" y2="508" stroke="#e7e4dd" stroke-width="1.5"/>
  <text x="400" y="544" text-anchor="middle" font-family="Georgia,'Times New Roman',serif" font-style="italic" font-size="21" fill="#6e7480">approximately Gaussian even when the physical parameters are skewed</text>
</svg>
